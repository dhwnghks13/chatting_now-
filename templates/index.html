<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>관리자 보안 채팅방</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; }
        #chatBox { height: 75vh; background: white; border-radius: 12px; overflow-y: auto; padding: 15px; border: 1px solid #ccc; display: flex; flex-direction: column; gap: 10px; }
        .input-area { display: flex; gap: 8px; margin-top: 10px; }
        input { border: 1px solid #ddd; border-radius: 6px; padding: 10px; }
        button { background: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; padding: 0 20px; font-weight: bold; }
        
        .msg { max-width: 75%; padding: 10px; border-radius: 10px; font-size: 14px; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .normal { align-self: flex-start; background: #ffffff; color: #333; }
        .admin { align-self: flex-end; background: #e3f2fd; border: 2px solid #007bff !important; color: #0d47a1; }
        .system { align-self: center; background: #fff3cd; color: #856404; font-size: 12px; padding: 4px 12px; border-radius: 15px; }
        
        .nick-label { font-size: 11px; font-weight: bold; margin-bottom: 4px; display: block; }
        .real-name { color: #ff5722; font-weight: bold; font-size: 12px; margin-left: 5px; }
        .time { font-size: 9px; color: #999; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="nickname" placeholder="닉네임#비번" style="width:15%">
        <input type="text" id="name" placeholder="실명입력" style="width:15%">
        <input type="text" id="chatInput" placeholder="메시지 입력..." style="flex-grow:1" onkeypress="if(event.keyCode==13)send()">
        <button onclick="send()">전송</button>
    </div>

    <script>
        var socket = io();
        function send() {
            var nick = document.getElementById('nickname').value.trim();
            var real = document.getElementById('name').value.trim();
            var msg = document.getElementById('chatInput').value.trim();
            if(!nick || !real || !msg) return alert("닉네임, 실명, 메시지를 모두 입력하세요!");
            socket.emit('my_chat', { name: nick, ylm: real, msg: msg });
            document.getElementById('chatInput').value = "";
        }

        socket.on('my_chat', function(data) {
            var chatBox = document.getElementById('chatBox');
            var div = document.createElement('div');
            
            if(data.role === 'system') {
                div.className = "msg system";
                div.innerText = data.msg;
            } else {
                div.className = "msg " + (data.role === 'admin' ? 'admin' : 'normal');
                var nameDisplay = data.name;
                
                // 관리자에게만 실명이 포함된 데이터가 전달됨
                if(data.real_name_secret) {
                    nameDisplay += ` <span class="real-name">[실명: ${data.real_name_secret}]</span>`;
                }
                
                div.innerHTML = `<span class="nick-label">${nameDisplay}</span>` + 
                                `<div>${data.msg}</div>` + 
                                `<span class="time">${data.time || ''}</span>`;
            }
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        socket.on('disconnect', function() {
            alert("서버와 연결이 끊겼습니다.");
            location.reload();
        });
    </script>
</body>
</html>
